apiVersion: middleware.cn/v1
kind: MiddlewareOperatorBaseline
metadata:
  name: rabbitmq-operator-standard
  annotations:
    baselineName: "标准版"
    description: "标准版基线,包含核心功能和必要依赖,适用于快速部署和基本应用场景,稳定可靠,易于扩展和维护."
spec:
  gvks:
    - name: v1alpha1
      group: "rabbitmq.middleware.hc.cn"
      version: "v1alpha1"
      kind: "RabbitmqCluster"
  globe:
    repository: "10.10.101.172:443"
    project: "middleware"
    resource:
      limits:
        cpu: "500m"
        memory: "500Mi"
      requests:
        cpu: "100m"
        memory: "250Mi"
  preActions:
    - name: pre-rabbitmq-operator-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: { }
      exposed: true
    - name: pre-rabbitmq-operator-tolerations
      parameters:
        tolerations: [ ]
      exposed: true
  permissionScope: "Cluster"
  permissions:
    - serviceAccountName: "{{ .Globe.Name }}-rabbitmq-operator"
      rules:
        - apiGroups:
            - apiextensions.k8s.io
          resources:
            - customresourcedefinitions
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - endpoints
            - configmaps
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - statefulsets
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - services
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - controllerrevisions
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - events
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - pods
          verbs:
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - rabbitmq.middleware.hc.cn
          resources:
            - rabbitmqclusters
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - pods/exec
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - nodes
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - rabbitmq.middleware.hc.cn
          resources:
            - rabbitmqclusters/status
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - deployments
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - coordination.k8s.io
          resources:
            - leases
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
  deployment:
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: rabbitmq-operator
          app.kubernetes.io/instance: "{{ .Globe.Name }}"
      template:
        metadata:
          labels:
            middleware: "{{ .Globe.Name }}"
            app.kubernetes.io/name: rabbitmq-operator
            app.kubernetes.io/instance: "{{ .Globe.Name }}"
        spec:
          containers:
            - name: rabbitmq-operator
              securityContext:
              image: '{{ if ne .Globe.repository "" }}{{ .Globe.repository }}/{{ end }}{{ .Globe.project }}/rabbitmq-operator:v1.2.0'
              imagePullPolicy: IfNotPresent
              command:
                - /manager
                - --leader-elect=true
              ports:
                - name: http
                  containerPort: 9443
                  protocol: TCP
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              resources:
                limits:
                  cpu: '"{{ .Globe.resource.limits.cpu }}"'
                  memory: '"{{ .Globe.resource.limits.memory }}"'
                requests:
                  cpu: '"{{ .Globe.resource.requests.cpu }}"'
                  memory: '"{{ .Globe.resource.requests.memory }}"'
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - preference:
                    matchExpressions:
                      - key: system
                        operator: In
                        values:
                          - "true"
                  weight: 100
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    topologyKey: "kubernetes.io/hostname"
                    labelSelector:
                      matchExpressions:
                        - key: middleware
                          operator: In
                          values:
                            - "{{ .Globe.Name }}"
          tolerations:
          serviceAccount: "{{ .Globe.Name }}-rabbitmq-operator"
  configurations:
    - name: "crd-rabbitmqcluster"
      values: { }
    - name: "rabbitmq-operator-dashboard"
      values: { }
apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: crd-rabbitmqcluster
spec:
  template: |
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: rabbitmqclusters.rabbitmq.middleware.hc.cn
      labels:
        MiddlewareCluster: rabbitmqcluster
    spec:
      conversion:
        strategy: None
      group: rabbitmq.middleware.hc.cn
      names:
        categories:
          - all
        kind: RabbitmqCluster
        listKind: RabbitmqClusterList
        plural: rabbitmqclusters
        shortNames:
          - rqc
        singular: rabbitmqcluster
      preserveUnknownFields: false
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              x-kubernetes-preserve-unknown-fields: true
          additionalPrinterColumns:
            - name: DESIRED
              type: string
              jsonPath: .spec.replicas
            - name: Status
              type: string
              jsonPath: .status.phase
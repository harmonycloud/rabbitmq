apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: pre-rabbitmq-affinity
spec:
  baselineType: "PreAction"
  actionType: "affinity"
  necessary:
    podAntiAffinityTopologKey: ""
    podAntiAffinity: ""
    nodeAffinity: { }
  steps:
    - name: affinity
      type: "KubectlEdit" # KubectlGet、KubectlEdit、KubectlExec、Exec、HTTP
      cue: |
        output: {
          spec: parameters.spec
        }
        parameters: {
          spec: {
            parameters: {
              statefulsetComponent: {
                broker: {
                  spec: {
                    template: {
                      spec: {
                        {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion }}
                        topologySpreadConstraints: [
                        {{- if ne .Necessary.podAntiAffinityTopologKey "kubernetes.io/hostname"}}
                          {
                            maxSkew: 1
                            topologyKey: "{{ .Necessary.podAntiAffinityTopologKey | default "" }}"
                            {{- if eq .Necessary.podAntiAffinity "hard"}}
                            whenUnsatisfiable: "DoNotSchedule"
                            {{- else if eq .Necessary.podAntiAffinity "soft"}}
                            whenUnsatisfiable: "ScheduleAnyway"
                            {{- end }}
                            labelSelector: {
                              matchLabels: {
                                "app": "{{ .Globe.Name }}"
                              }
                            }
                          },
                        {{- end }}
                          {
                            maxSkew: 1
                            topologyKey: "kubernetes.io/hostname"
                            {{- if eq .Necessary.podAntiAffinity "hard"}}
                            whenUnsatisfiable: "DoNotSchedule"
                            {{- else if eq .Necessary.podAntiAffinity "soft"}}
                            whenUnsatisfiable: "ScheduleAnyway"
                            {{- end }}
                            labelSelector: {
                              matchLabels: {
                                "app": "{{ .Globe.Name }}"
                              }
                            }
                          },
                        ]
                        {{- if .Necessary.nodeAffinity }}
                        affinity: {
                          {{- with .Necessary.nodeAffinity }}
                          nodeAffinity: {{ toCue . }}
                          {{- end }}
                        }
                        {{- end }}
                        {{- end }}
                        {{- if semverCompare "<1.19-0" .Capabilities.KubeVersion.GitVersion }}
                        affinity: {
                          {{- if eq .Necessary.podAntiAffinity "hard"}}
                          podAntiAffinity: {
                            requiredDuringSchedulingIgnoredDuringExecution: [
                              {
                                labelSelector: {
                                  matchExpressions: [
                                    {
                                      key: "app"
                                      operator: "In"
                                      values: ["{{ .Globe.Name }}"]
                                    },
                                  ]
                                }
                                topologyKey: "{{ .Necessary.podAntiAffinityTopologKey }}"
                              },
                            ]
                          }
                          {{- else if eq .Necessary.podAntiAffinity "soft"}}
                          podAntiAffinity: {
                            preferredDuringSchedulingIgnoredDuringExecution: [
                              {
                                weight: 100
                                podAffinityTerm:
                                  topologyKey: "{{ .Necessary.podAntiAffinityTopologKey }}"
                                  labelSelector: {
                                    matchExpressions: [
                                      {
                                        key: "app"
                                        operator: "In"
                                        values: ["{{ .Globe.Name }}"]
                                      },
                                    ]
                                  }
                                }
                              },
                            ]
                          }
                          {{- end }}
                          {{- with .Necessary.nodeAffinity }}
                          nodeAffinity: {{ toCue . }}
                          {{- end }}
                        }
                        {{- end }}
                      }
                    }
                  }
                }
              }
            }
          }
          resource: {
            apiversion: "middleware.cn/v1"
            kind: "Middleware"
            name: "{{ .Globe.Name }}"
            namespace: "{{ .Globe.Namespace }}"
          }
        }

apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: rabbitmq-restart
  annotations:
    alias: "服务重启"
spec:
  baselineType: "OpsAction"
  actionType: "restart"
  necessary:
  steps:
    - name: restart
      cmd:
        command:
          - "kubectl"
          - "patch"
          - "RabbitmqCluster"
          - "{{ .Globe.MiddlewareName }}"
          - "-n"
          - "{{ .Globe.Namespace }}"
          - "--type=merge"
          - "-p"
          - '''{"metadata":{"annotations":{"middleware.maintenance.lock":"graceful-restart","middleware.maintenance.step":"0"}}}'''

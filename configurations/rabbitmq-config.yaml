apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: rabbitmq-config
spec:
  template: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "{{ .Globe.Name }}-rabbitmq-config"
    data:
      enabled_plugins: |
        [rabbitmq_management,rabbitmq_prometheus,rabbitmq_peer_discovery_k8s,rabbitmq_federation,rabbitmq_federation_management].
      rabbitmq.conf: |
        ## Cluster formation. See https://www.rabbitmq.com/cluster-formation.html to learn more.
        cluster_formation.peer_discovery_backend  = k8s
        cluster_formation.k8s.host = kubernetes.default.svc.cluster.local.
        cluster_formation.k8s.port = 443
        cluster_formation.k8s.token_path = /var/run/secrets/kubernetes.io/serviceaccount/token
        cluster_formation.k8s.cert_path = /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        cluster_formation.k8s.namespace_path = /var/run/secrets/kubernetes.io/serviceaccount/namespace
        ## Should RabbitMQ node name be computed from the pod's hostname or IP address?
        ## IP addresses are not stable, so using [stable] hostnames is recommended when possible.
        ## Set to "hostname" to use pod hostnames.
        ## When this value is changed, so should the variable used to set the RABBITMQ_NODENAME
        ## environment variable.
        cluster_formation.k8s.address_type = hostname
        ## How often should node cleanup checks run?
        cluster_formation.node_cleanup.interval = 30
        ## Set to false if automatic removal of unknown/absent nodes
        ## is desired. This can be dangerous, see
        ##  * https://www.rabbitmq.com/cluster-formation.html#node-health-checks-and-cleanup
        ##  * https://groups.google.com/forum/#!msg/rabbitmq-users/wuOfzEywHXo/k8z_HWIkBgAJ
        cluster_formation.node_cleanup.only_log_warning = true
        cluster_partition_handling = {{ .Values.args.clusterPartitionHandling }}
        ## See https://www.rabbitmq.com/ha.html#master-migration-data-locality
        queue_master_locator=min-masters
        ## This is just an example.
        ## This enables remote access for the default user with well known credentials.
        ## Consider deleting the default user and creating a separate user with a set of generated
        ## credentials instead.
        ## Learn more at https://www.rabbitmq.com/access-control.html#loopback-users
        loopback_users.guest = false
        {{- $memRequest := regexFind "[0-9]*" .Values.resources.requests.memory }}
        total_memory_available_override_value = {{ $memRequest }}GB
        cluster_formation.k8s.hostname_suffix = .{{ .Globe.Name }}-headless-svc.{{ .Globe.Namespace }}.svc.cluster.local
        vm_memory_high_watermark.relative = {{ .Values.args.vmMemoryHighWatermarkRelative }}
        default_user = {{ .Values.args.defaultUser }}
        default_pass = {{ .Values.args.defaultPassword }}
        disk_free_limit.absolute = {{ .Values.args.diskFreeLimitAbsolute }}
        
        ##日志配置
        log.console = true
        log.console.level = {{ .Values.args.logLevel }}
        
        log.file = rabbit.log
        log.dir = /var/log/rabbitmq
        log.file.level = {{ .Values.args.logLevel }}
        
        log.file.rotation.size = {{ .Values.args.logRotationSize | int }}
        log.file.rotation.count = {{ .Values.args.logRotationCount }}
